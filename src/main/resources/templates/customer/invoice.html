<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title th:text="${booking.eventDate} + ' Event'">Invoice</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/invoice.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <section class="invoice-page">
        <div class="invoice-card">
            <p class="invoice-card__eyebrow">Invoice</p>
            <h1 th:text="${booking.eventDate} + ' Event'">Invoice</h1>
            <p class="invoice-card__intro">Review the booking charges and complete payment when you are ready.</p>

            <div class="invoice-card__summary">
                <div>
                    <p class="invoice-card__label">Status</p>
                    <p class="invoice-card__status"
                       th:if="${invoice.status.name() != 'PAID'}"
                       th:text="${invoice.status}">
                        Status
                    </p>
                    <p class="invoice-card__status invoice-card__status--paid"
                       th:if="${invoice.status.name() == 'PAID'}"
                       th:text="${invoice.status}">
                        Status
                    </p>
                </div>
                <div>
                    <p class="invoice-card__label">Total Amount</p>
                    <p class="invoice-card__total">
                        <span th:text="${invoice.totalAmount}">0.00</span>
                        <span th:text="${#strings.toUpperCase(invoice.currency)}">CAD</span>
                    </p>
                </div>
            </div>

            <dl class="invoice-card__details">
                <div class="invoice-card__row">
                    <dt>Invoice ID</dt>
                    <dd th:text="${invoice.id}">ID</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Booking ID</dt>
                    <dd th:text="${booking.id}">ID</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Organizer</dt>
                    <dd th:text="${booking.plannerName}">Organizer</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Plan Name</dt>
                    <dd th:text="${booking.planName}">Plan</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Event Date</dt>
                    <dd th:text="${booking.eventDate}">Date</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Base Price</dt>
                    <dd th:text="${booking.price}">0.00</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Tax GST (5%)</dt>
                    <dd th:text="${#numbers.formatDecimal(booking.price * 0.05, 1, 2)}">0.00</dd>
                </div>
                <div class="invoice-card__row">
                    <dt>Created At</dt>
                    <dd th:text="${#temporals.format(invoice.createdAt, 'yyyy-MM-dd HH:mm')}">Created</dd>
                </div>
                <div class="invoice-card__row" th:if="${invoice.paidAt != null}">
                    <dt>Paid At</dt>
                    <dd th:text="${#temporals.format(invoice.paidAt, 'yyyy-MM-dd HH:mm')}">Paid</dd>
                </div>
            </dl>

            <form class="invoice-card__actions"
                  th:if="${invoice.status.name() != 'PAID'}"
                  th:action="@{/payments/checkout/{invoiceId}(invoiceId=${invoice.id})}"
                  method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button class="invoice-card__button" type="submit">Proceed to Payment</button>
            </form>

            <p class="invoice-card__message" th:if="${invoice.status.name() == 'PAID'}">
                Payment completed.
            </p>
        </div>
    </section>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
