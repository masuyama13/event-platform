<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Find Your Perfect Event Partner</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/organizer-list.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<div class="organizer-directory">
    <h1 class="organizer-directory__title">Find Your Perfect Event Partner</h1>

    <form method="get" th:action="@{/organizers}" class="organizer-directory__filter">
        <label for="categoryId">Filter by category:</label>
        <select id="categoryId" name="categoryId">
            <option value="">All categories</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}">
            </option>
        </select>
        <button type="submit" class="organizer-directory__filter-button">Apply</button>
    </form>

    <section class="organizer-directory__section"
             th:if="${sponsoredOrganizers != null and !#lists.isEmpty(sponsoredOrganizers)}">
        <div class="organizer-list organizer-list--sponsored">
            <article class="organizer-list__item organizer-list__item--sponsored"
                     th:each="organizer : ${sponsoredOrganizers}">
                <div class="organizer-list__content">
                    <div class="organizer-list__header">
                        <div>
                            <span class="organizer-list__badge">Sponsored</span>
                            <h2 th:text="${organizer.businessName}">Business Name</h2>
                        </div>
                    </div>
                    <p class="organizer-list__rating">
                        Rating:
                        <strong th:text="${organizer.averageRating != null}
                                      ? (${organizer.averageRating} + ' / 5')
                                      : '0.0 / 5'">
                            0.0 / 5
                        </strong>
                    </p>

                    <div class="organizer-list__categories"
                         th:if="${organizer.sortedCategories != null and !#lists.isEmpty(organizer.sortedCategories)}">
                        <span class="organizer-list__tag"
                              th:each="category : ${organizer.sortedCategories}"
                              th:text="${category.name}">
                            Category
                        </span>
                    </div>
                    <p class="organizer-list__categories organizer-list__categories--empty"
                       th:if="${organizer.sortedCategories == null or #lists.isEmpty(organizer.sortedCategories)}">
                        No categories
                    </p>

                    <p class="organizer-list__description" th:text="${organizer.description} ?: 'N/A'">Description</p>
                </div>

                <div class="organizer-list__actions">
                    <a th:href="@{/organizers/{id}(id=${organizer.id})}"
                       class="organizer-list__button button button--primary">
                        View Details
                    </a>
                </div>
            </article>
        </div>
    </section>

    <section class="organizer-directory__section">
    <div class="organizer-list"
         th:if="${organizers != null and !#lists.isEmpty(organizers)}">

        <article class="organizer-list__item" th:each="organizer : ${organizers}">
            <div class="organizer-list__content">
                <div class="organizer-list__header">
                    <h2 th:text="${organizer.businessName}">Business Name</h2>
                </div>
                <p class="organizer-list__rating">
                    Rating:
                    <strong th:text="${organizer.averageRating != null}
                                      ? (${organizer.averageRating} + ' / 5')
                                      : '0.0 / 5'">
                        0.0 / 5
                    </strong>
                </p>

                <div class="organizer-list__categories"
                     th:if="${organizer.sortedCategories != null and !#lists.isEmpty(organizer.sortedCategories)}">
                    <span class="organizer-list__tag"
                          th:each="category : ${organizer.sortedCategories}"
                          th:text="${category.name}">
                        Category
                    </span>
                </div>
                <p class="organizer-list__categories organizer-list__categories--empty"
                   th:if="${organizer.sortedCategories == null or #lists.isEmpty(organizer.sortedCategories)}">
                    No categories
                </p>

                <p class="organizer-list__description" th:text="${organizer.description} ?: 'N/A'">Description</p>
            </div>

            <div class="organizer-list__actions">
                <a th:href="@{/organizers/{id}(id=${organizer.id})}"
                   class="organizer-list__button button button--primary">
                    View Details
                </a>
            </div>
        </article>
    </div>

    <div class="organizer-directory__empty" th:if="${organizers == null or #lists.isEmpty(organizers)}">
        <p>No organizers found.</p>
    </div>
    </section>
</div>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
