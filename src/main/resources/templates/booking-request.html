<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Request</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<div class="container">
    <h1>Booking Request</h1>

    <div class="confirmation-card">
        <h2>Choose Your Date</h2>

        <table class="info-table">
            <tr>
                <td>Plan Name:</td>
                <td th:text="${plan.planName}">Plan Name</td>
            </tr>
            <tr>
                <td>Organizer:</td>
                <td th:text="${plan.organizer != null}
                             ? ${plan.organizer.businessName} : 'N/A'">
                    Organizer Name
                </td>
            </tr>
            <tr>
                <td>Price:</td>
                <td>$<span th:text="${plan.price}">Price</span></td>
            </tr>
        </table>

        <form action="/bookings" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <input type="hidden" name="planId" th:value="${plan.id}"/>

            <div class="row">
                <label for="eventDate">Event Date:</label>
                <input id="eventDate"
                       type="date"
                       name="eventDate"
                       th:min="${#temporals.format(earliestBookingDate, 'yyyy-MM-dd')}"
                       required/>
            </div>

            <div class="buttons">
                <a th:href="@{/booking/plans(organizerId=${organizerId})}" class="btn-back">Back to Plans</a>
                <button type="submit" class="btn-confirm">Request Booking</button>
            </div>
        </form>
    </div>
</div>

 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
