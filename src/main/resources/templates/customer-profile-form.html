<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Customer Profile</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
    <link rel="stylesheet" th:href="@{/css/profile-form.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <section class="profile-form-page">
        <div class="profile-form-page__header">
            <p class="profile-form-page__eyebrow">Profile</p>
            <h1>Edit Customer Profile</h1>
            <p class="profile-form-page__intro">Update your contact details so organizers and bookings stay aligned with your current information.</p>
        </div>

        <p class="profile-form-error" th:if="${error}" th:text="${error}"></p>

        <form th:action="@{/profile/customer}" method="post" class="admin-form profile-form">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div class="profile-form-grid">
                <label class="admin-form__field">
                    <span>First Name</span>
                    <input id="firstName" name="firstName" type="text" th:value="${customer.firstName}" required>
                </label>

                <label class="admin-form__field">
                    <span>Last Name</span>
                    <input id="lastName" name="lastName" type="text" th:value="${customer.lastName}" required>
                </label>

                <label class="admin-form__field">
                    <span>Email</span>
                    <input id="email" name="email" type="email" th:value="${email}" required>
                </label>

                <label class="admin-form__field">
                    <span>Phone</span>
                    <input id="phone" name="phone" type="text" th:value="${customer.phone}">
                </label>

                <label class="admin-form__field">
                    <span>Address</span>
                    <input id="address" name="address" type="text" th:value="${customer.address}">
                </label>
            </div>

            <div class="profile-form__actions">
                <a th:href="@{/profile}" class="profile-form__button profile-form__button--secondary">Cancel</a>
                <button type="submit" class="profile-form__button">Save Profile</button>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
