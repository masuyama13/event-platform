<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Page Not Found</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <section class="not-found">
        <p class="not-found__code">404 NOT FOUND</p>
        <h1>Page not found</h1>
        <p>The page you tried to open does not exist or may have moved.</p>
        <a class="not-found__link" th:href="@{/}">Back to Home</a>
    </section>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
