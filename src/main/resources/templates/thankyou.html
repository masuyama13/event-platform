<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Thank You</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{fragments :: siteHeader}"></header>
<main class="app-main">

<div class="container">
    <div class="thankyou-card">
        <h1>🎉 Thank You!</h1>
        <p>Your booking has been confirmed!</p>

        <table class="info-table">
            <tr>
                <td>Booking ID:</td>
                <td th:text="${booking.id}">ID</td>
            </tr>
            <tr>
                <td>Organizer:</td>
                <td th:text="${booking.organizerProfile != null
                               ? booking.organizerProfile.businessName : 'N/A'}">
                    Organizer Name
                </td>
            </tr>
            <tr>
                <td>Plan Name:</td>
                <td th:text="${booking.planName}">Plan Name</td>
            </tr>
            <tr>
                <td>Date:</td>
                <td th:text="${booking.eventDate}">Date</td>
            </tr>
            <tr>
                <td>Price:</td>
                <td>$<span th:text="${booking.price}">Price</span></td>
            </tr>
            <tr>
                <td>Status:</td>
                <td th:text="${booking.status}">Status</td>
            </tr>
        </table>

        <div class="buttons">
            <a href="/organizers" class="btn-confirm">
                Back to Organizer List
            </a>
            <a th:href="@{/invoices/view/{bookingId}(bookingId=${booking.id})}">
                <button>View Invoice</button>
            </a>
        </div>
    </div>
</div>
 </main>
<footer th:replace="~{fragments :: siteFooter}"></footer>
</body>
</html>
