<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Edit Sponsorship</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/admin-sponsorship.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <div class="admin-form-page">
        <p class="admin-page__eyebrow">Admin</p>
        <h1 th:text="${organizer.businessName}">Business Name</h1>
        <p class="admin-page__intro">Set the sponsored period to show this organizer in the Sponsored section.</p>

        <p class="admin-page__error" th:if="${error != null}" th:text="${error}">Error message</p>

        <form th:action="@{/admin/sponsorships/{organizerId}(organizerId=${organizer.id})}" method="post" class="admin-form">
            <label class="admin-form__field">
                <span>Sponsored From</span>
                <input type="datetime-local"
                       name="sponsoredFrom"
                       th:value="${organizer.sponsoredFrom != null ? #temporals.format(organizer.sponsoredFrom, 'yyyy-MM-dd''T''HH:mm') : ''}">
            </label>

            <label class="admin-form__field">
                <span>Sponsored Until</span>
                <input type="datetime-local"
                       name="sponsoredUntil"
                       th:value="${organizer.sponsoredUntil != null ? #temporals.format(organizer.sponsoredUntil, 'yyyy-MM-dd''T''HH:mm') : ''}">
            </label>

            <div class="admin-form__actions">
                <button type="submit" class="admin-form__button">Save Sponsorship</button>
                <a th:href="@{/admin/sponsorships}" class="admin-form__button admin-form__button--secondary">Back</a>
            </div>
        </form>

        <form th:action="@{/admin/sponsorships/{organizerId}/clear(organizerId=${organizer.id})}" method="post" class="admin-form admin-form--clear">
            <button type="submit" class="admin-form__button admin-form__button--danger">Clear Sponsorship</button>
        </form>
    </div>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
