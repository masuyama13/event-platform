<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Plan Form</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<h2 th:text="${editingPlan != null} ? 'Edit Plan' : 'Create Plan'">Create Plan</h2>

<form th:action="${editingPlan != null} ? @{/plans/{planId}/edit(planId=${editingPlan.id})} : @{/plans/create}" method="post">
    <input type="hidden"
           th:if="${_csrf != null}"
           th:name="${_csrf.parameterName}"
           th:value="${_csrf.token}"/>
    <label>Plan Name:</label>
    <input type="text" name="planName" th:value="${editingPlan != null ? editingPlan.planName : ''}" required />

    <label>Price:</label>
    <input type="number" name="price" step="0.01" th:value="${editingPlan != null ? editingPlan.price : ''}" required />

    <label>Description:</label>
    <input type="text" name="description" th:value="${editingPlan != null ? editingPlan.description : ''}" required />

    <button type="submit" th:text="${editingPlan != null} ? 'Update Plan' : 'Create Plan'">Create Plan</button>
    <a th:href="@{/plans/manage}">Back to Plans</a>
</form>

</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
