<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Admin Home</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/home.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <section class="home-page">
        <div class="home-page__header">
            <p class="home-page__eyebrow">Admin</p>
            <h1>Overview</h1>
            <p class="home-page__intro">Manage organizer sponsorships and featured placement across the marketplace.</p>
        </div>
        <div class="home-grid">
            <a th:href="@{/admin/sponsorships}" class="home-card">
                <h2>Manage Sponsorships</h2>
                <p>Review sponsored organizer windows and keep featured placement up to date.</p>
            </a>
        </div>
    </section>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
