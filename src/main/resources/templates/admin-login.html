<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>EventOmakase | Admin Login</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <div class="admin-form-page">
        <p class="admin-page__eyebrow">Admin</p>
        <h1>Admin Login</h1>

        <p class="admin-page__error" th:if="${param.error != null}">Invalid admin credentials.</p>
        <p class="admin-page__message" th:if="${param.logout != null}">You have been logged out.</p>

        <form th:action="@{/admin/login}" method="post" class="admin-form">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <label class="admin-form__field">
                <span>Email</span>
                <input type="email" name="username" required>
            </label>
            <label class="admin-form__field">
                <span>Password</span>
                <input type="password" name="password" required>
            </label>
            <div class="admin-form__actions">
                <button type="submit" class="admin-form__button">Admin Login</button>
                <a th:href="@{/login}" class="admin-form__button admin-form__button--secondary">User Login</a>
            </div>
        </form>
    </div>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
