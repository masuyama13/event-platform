<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
<div class="container">

    <!-- Show who is viewing -->
    <h1 th:text="${role == 'organizer' ? 'Organizer View' : 'Customer View'}">
        Messages
    </h1>

    <!-- Role Switch Buttons for Testing -->
    <!-- TODO: Remove when real authentication is ready -->
    <div class="role-switch">
        <p>Switch View (Temporary for Testing):</p>
        <a th:href="@{/messages(organizerUserId=${organizerUserId}, role='customer')}"
           class="btn-back">
            Customer View
        </a>
        <a th:href="@{/messages(organizerUserId=${organizerUserId}, role='organizer')}"
           class="btn-confirm">
            Organizer View
        </a>
    </div>

    <!-- Conversation Box -->
    <!-- Customer message → left (message-received) -->
    <!-- Organizer message → right (message-sent) -->
    <div class="message-box">
        <div th:each="message : ${messages}"
             th:classappend="${message.sender.id == 1} ?
                              'message-received' : 'message-sent'">

            <p class="message-sender"
               th:text="${message.sender.id == 1 ? 'Customer' : 'Organizer'}">
                Sender
            </p>
            <p class="message-content"
               th:text="${message.content}">
                Content
            </p>
            <p class="message-time"
               th:text="${message.sentAt}">
                Time
            </p>
        </div>

        <!-- Show if no messages yet -->
        <p th:if="${#lists.isEmpty(messages)}"
           class="no-messages">
            No messages yet. Start the conversation!
        </p>
    </div>

    <!-- Send Message Form -->
    <div class="send-form">
        <form action="/messages/send" method="post">
            <!-- ALL parameter names must match @RequestParam in controller -->
            <input type="hidden" name="organizerUserId"
                   th:value="${organizerUserId}">
            <input type="hidden" name="senderId"
                   th:value="${senderId}">
            <input type="hidden" name="receiverId"
                   th:value="${receiverId}">
            <input type="hidden" name="role"
                   th:value="${role}">

            <textarea name="content"
                      placeholder="Type your message here..."
                      rows="3"
                      required></textarea>

            <div class="buttons">
                <button type="submit" class="btn-confirm">Send</button>
            </div>
        </form>
    </div>

    <a href="/organizers" class="btn-back">← Back to Organizers</a>
</div>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
