<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Booking Requests</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <h1>Booking Requests</h1>

    <div th:if="${#lists.isEmpty(bookings)}">
        <p>No booking requests.</p>
    </div>

    <div th:each="booking : ${bookings}">
        <p>Booking ID: <span th:text="${booking.id}"></span></p>
        <p>Customer: <span th:text="${booking.customerProfile.user.email}"></span></p>
        <p>Plan: <span th:text="${booking.planName}"></span></p>
        <p>Status: <span th:text="${booking.status}"></span></p>
        <p>Date: <span th:text="${booking.eventDate}"></span></p>

        <div th:if="${booking.status.name() == 'REQUESTED'}">
            <form th:action="@{/organizer/bookings/{bookingId}/approve(bookingId=${booking.id})}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit">Approve</button>
            </form>

            <form th:action="@{/organizer/bookings/{bookingId}/reject(bookingId=${booking.id})}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <button type="submit">Reject</button>
            </form>
        </div>
        <hr>
    </div>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
