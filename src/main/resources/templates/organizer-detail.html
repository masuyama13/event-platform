<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Organizer Detail</title>
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body>

<div class="container">
    <h1>Organizer Detail</h1>

    <div class="plan-card">
        <h2 th:text="${organizer.businessName}">Business Name</h2>

        <p>Email: <span th:text="${organizer.user.email}">organizer@email.com</span></p>
        <p>Description: <span th:text="${organizer.description} ?: 'N/A'">Description</span></p>
        <p>Category: <span th:text="${organizer.serviceCategory} ?: 'N/A'">Category</span></p>
        <p>Phone: <span th:text="${organizer.phone} ?: 'N/A'">Phone</span></p>
        <p>Website: <span th:text="${organizer.website} ?: 'N/A'">Website</span></p>
        <p>Address: <span th:text="${organizer.address} ?: 'N/A'">Address</span></p>
        <p>Rating: <span th:text="${organizer.averageRating} ?: 0.0">0.0</span></p>
        <p>Created At: <span th:text="${organizer.createdAt}">Created Time</span></p>
        <p>Updated At: <span th:text="${organizer.updatedAt}">Updated Time</span></p>

        <p>
            <a th:href="@{/organizers}">Back</a>
            |
            <a th:href="@{/organizers/edit/{id}(id=${organizer.id})}">Edit</a>
        </p>
    </div>
</div>

</body>
</html>
