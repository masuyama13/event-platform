<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Messages</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/message-thread.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <div class="container message-thread-page">

        <p class="message-thread-page__eyebrow">
            Messages
        </p>

        <h1 class="message-thread-page__title">Conversation</h1>

        <h2 class="message-thread-page__subtitle">
            with
            <span th:text="${otherUserName}">Other User</span>
        </h2>

        <!-- Conversation Board -->
        <div class="message-box">
            <div th:each="message : ${messages}"
                 th:class="${message.sender.id == currentUserId} ? 'message-sent' : 'message-received'">

                <!-- Sender name: firstName for customer, businessName for organizer -->
                <p class="message-sender"
                   th:text="${message.sender.id == currentUserId} ? ${currentUserName} : ${otherUserName}">
                    Sender
                </p>

                <p class="message-content"
                   th:text="${message.content}">
                    Content
                </p>

                <p class="message-time"
                   th:text="${#temporals.format(message.sentAt, 'yyyy-MM-dd HH:mm')}">
                    Time
                </p>
            </div>

            <p th:if="${#lists.isEmpty(messages)}" class="no-messages">
                No messages yet. Start the conversation!
            </p>
        </div>

        <!-- Send Message Form -->
        <div class="send-form">
            <form th:action="@{/messages/send}" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>

                <input type="hidden" name="otherUserId" th:value="${otherUserId}"/>
                <input type="hidden" name="role" th:value="${role}"/>

                <textarea name="content"
                          placeholder="Type your message here..."
                          rows="3"
                          required></textarea>

                <div class="buttons">
                    <button type="submit" class="btn-confirm button button--primary">Send</button>
                </div>
            </form>
        </div>

        <!-- Return to inbox -->
        <a th:href="${role == 'organizer'} ? '/messages/inbox' : '/messages/customer-inbox'"
           class="btn-back button button--secondary">
            Go to Inbox
        </a>

    </div>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
