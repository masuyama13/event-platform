<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Payment Submitted</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/payment-status.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <section class="payment-status-page">
        <div class="payment-status-card">
            <p class="payment-status-card__eyebrow">Payment</p>
            <h1>Payment Submitted</h1>
            <p class="payment-status-card__intro">
                Your payment was submitted through Stripe. The invoice will be finalized after the webhook is received.
            </p>
            <div class="payment-status-card__summary" th:if="${invoice != null}">
                <p class="payment-status-card__label">Current Invoice Status</p>
                <p class="payment-status-card__status payment-status-card__status--success" th:text="${invoice.status}">
                    Status
                </p>
            </div>
            <div class="payment-status-card__actions" th:if="${invoice != null}">
                <a th:href="@{/invoices/view/{bookingId}(bookingId=${invoice.booking.id})}" class="button button--primary">
                    Back to Invoice
                </a>
            </div>
        </div>
    </section>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
