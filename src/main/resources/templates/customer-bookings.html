<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>My Bookings</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <h1>My Bookings</h1>

    <div th:if="${#lists.isEmpty(bookings)}">
        <p>No bookings yet.</p>
    </div>

    <div th:each="booking : ${bookings}">
        <p>Booking ID: <span th:text="${booking.id}"></span></p>
        <p>Organizer: <span th:text="${booking.organizerProfile.businessName}"></span></p>
        <p>Plan: <span th:text="${booking.planName}"></span></p>
        <p>Status: <span th:text="${booking.status}"></span></p>
        <p>Date: <span th:text="${booking.eventDate}"></span></p>
        <p><a th:href="@{/customer/bookings/{bookingId}(bookingId=${booking.id})}">View Booking Details</a></p>

        <div th:if="${booking.status.name() == 'APPROVED'}">
            <a th:href="@{/invoices/view/{bookingId}(bookingId=${booking.id})}">Proceed to Payment</a>
        </div>
        <div th:if="${booking.status.name() == 'REQUESTED'}">
            <p>Waiting for organizer review.</p>
        </div>
        <div th:if="${booking.status.name() == 'REJECTED'}">
            <p>This request was rejected.</p>
        </div>
        <hr>
    </div>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
