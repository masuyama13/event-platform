<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${pageTitle}">Register</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
  <link rel="stylesheet" th:href="@{/css/form.css}">
  <link rel="stylesheet" th:href="@{/css/auth.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
  <div class="auth-page admin-form-page auth-page--register">
    <p class="admin-page__eyebrow">User Account</p>
    <h1 th:text="${pageTitle}">Register</h1>
    <p class="auth-page__intro"
       th:text="${pageTitle == 'Organizer Register'} ?
       'Create your organizer account to showcase services and respond to event requests.' :
       'Create your account to start planning events and connecting with organizers.'">
      Create your account to start planning events and connecting with organizers.
    </p>

    <p class="admin-page__error" th:if="${error}" th:text="${error}"></p>

    <form th:action="${formAction}" method="post" class="admin-form auth-form">
      <input type="hidden"
             th:if="${_csrf != null}"
             th:name="${_csrf.parameterName}"
             th:value="${_csrf.token}"/>
      <label class="admin-form__field">
        <span>Email</span>
        <input type="email" name="email" required>
      </label>

      <label class="admin-form__field">
        <span>Password</span>
        <input type="password" name="password" required>
      </label>

      <div class="auth-form__grid" th:if="${pageTitle == 'Customer Register'}">
        <label class="admin-form__field">
          <span>First Name</span>
          <input type="text" name="firstName" required>
        </label>
        <label class="admin-form__field">
          <span>Last Name</span>
          <input type="text" name="lastName" required>
        </label>
        <label class="admin-form__field">
          <span>Phone</span>
          <input type="text" name="phone">
        </label>
        <label class="admin-form__field">
          <span>Address</span>
          <input type="text" name="address">
        </label>
        <label class="admin-form__field">
          <span>City</span>
          <input type="text" name="city">
        </label>
        <label class="admin-form__field">
          <span>Country</span>
          <input type="text" name="country">
        </label>
      </div>

      <div class="auth-form__stack" th:if="${pageTitle == 'Organizer Register'}">
        <label class="admin-form__field">
          <span>Business Name</span>
          <input type="text" name="businessName" required>
        </label>

        <label class="admin-form__field">
          <span>Description</span>
          <textarea name="description" rows="4" required></textarea>
        </label>

        <section class="admin-form__field auth-checkbox-group">
          <span>Service Categories</span>
          <div class="auth-checkbox-group__list">
            <label class="auth-checkbox-group__item" th:each="category : ${categories}">
              <input type="checkbox" name="categoryIds" th:value="${category.id}">
              <span th:text="${category.name}">Category</span>
            </label>
          </div>
        </section>

        <label class="admin-form__field">
          <span>Phone</span>
          <input type="text" name="phone" required>
        </label>

        <label class="admin-form__field">
          <span>Website</span>
          <input type="text" name="website" required>
        </label>

        <label class="admin-form__field">
          <span>Address</span>
          <input type="text" name="address" required>
        </label>
      </div>

      <div class="admin-form__actions">
        <button type="submit" class="admin-form__button">Sign Up</button>
      </div>
    </form>

    <div class="auth-links auth-links--single">
      <a class="auth-links__item" th:href="${alternateRegisterPath}">
        <span class="auth-links__label">Need a different account type?</span>
        <span th:text="'Register as ' + ${alternateRegisterLabel}">Register as Organizer</span>
      </a>
    </div>
  </div>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
