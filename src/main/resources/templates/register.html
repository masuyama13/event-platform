<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${pageTitle}">Register</title>
</head>
<body>
<h1 th:text="${pageTitle}">Register</h1>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<form th:action="${formAction}" method="post">
  <div>
    <label>Email:</label>
    <input type="email" name="email" required>
  </div>

  <div>
    <label>Password:</label>
    <input type="password" name="password" required>
  </div>

  <div th:if="${pageTitle == 'Customer Register'}">
    <div>
      <label>First Name:</label>
      <input type="text" name="firstName" required>
    </div>
    <div>
      <label>Last Name:</label>
      <input type="text" name="lastName" required>
    </div>
  </div>

  <div th:if="${pageTitle == 'Organizer Register'}">
    <div>
      <label>Business Name:</label>
      <input type="text" name="businessName" required>
    </div>

    <div>
      <label>Description:</label>
      <textarea name="description" rows="4" cols="40"></textarea>
    </div>

    <div>
      <label>Service Category:</label>
      <select name="serviceCategory" required>
        <option value="">Select a category</option>
        <option th:each="category : ${serviceCategories}"
                th:value="${category}"
                th:text="${category}"></option>
      </select>
    </div>

    <div>
      <label>Phone:</label>
      <input type="text" name="phone">
    </div>

    <div>
      <label>Website:</label>
      <input type="text" name="website">
    </div>

    <div>
      <label>Address:</label>
      <input type="text" name="address">
    </div>
  </div>

  <button type="submit">Sign Up</button>
</form>

<p>
  <a th:href="${alternateRegisterPath}"
     th:text="'Register as ' + ${alternateRegisterLabel}">Register as Organizer</a>
</p>
</body>
</html>
