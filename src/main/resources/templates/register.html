<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title th:text="${pageTitle}">Register</title>
  <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
<h1 th:text="${pageTitle}">Register</h1>

<p th:if="${error}" th:text="${error}" style="color:red;"></p>

<form th:action="${formAction}" method="post">
  <div>
    <label>Email:</label>
    <input type="email" name="email" required>
  </div>

  <div>
    <label>Password:</label>
    <input type="password" name="password" required>
  </div>

  <div th:if="${pageTitle == 'Customer Register'}">
    <div>
      <label>First Name:</label>
      <input type="text" name="firstName" required>
    </div>
    <div>
      <label>Last Name:</label>
      <input type="text" name="lastName" required>
    </div>
    <div>
      <label>Phone:</label>
      <input type="text" name="phone">
    </div>
    <div>
      <label>Address:</label>
      <input type="text" name="address">
    </div>
    <div>
      <label>City:</label>
      <input type="text" name="city">
    </div>
    <div>
      <label>Country:</label>
      <input type="text" name="country">
    </div>
  </div>

  <div th:if="${pageTitle == 'Organizer Register'}">
    <div>
      <label>Business Name:</label>
      <input type="text" name="businessName" required>
    </div>

    <div>
      <label>Description:</label>
      <textarea name="description" rows="4" cols="40"></textarea>
    </div>

    <div>
      <label>Service Categories:</label>
      <div th:each="category : ${categories}">
        <label>
          <input type="checkbox" name="categoryIds" th:value="${category.id}">
          <span th:text="${category.name}">Category</span>
        </label>
      </div>
    </div>

    <div>
      <label>Phone:</label>
      <input type="text" name="phone">
    </div>

    <div>
      <label>Website:</label>
      <input type="text" name="website">
    </div>

    <div>
      <label>Address:</label>
      <input type="text" name="address">
    </div>
  </div>

  <button type="submit">Sign Up</button>
</form>

<p>
  <a th:href="${alternateRegisterPath}"
     th:text="'Register as ' + ${alternateRegisterLabel}">Register as Organizer</a>
</p>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
