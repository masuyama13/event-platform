<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Organizer Form</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<div class="container">
    <h1 th:text="${isEdit} ? 'Edit Organizer' : 'Create Organizer'">Organizer Form</h1>

    <p th:if="${error}" th:text="${error}" style="color:red;"></p>

    <div class="plan-card">
        <form th:action="${isEdit} ? @{/organizers/profile/organizer} : @{/organizers}" method="post">

            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <div th:if="${!isEdit}">
                <label for="userId">Organizer User:</label><br>
                <select id="userId" name="userId" required>
                    <option value="">-- Select Organizer User --</option>
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.email}">
                    </option>
                </select>
            </div>

            <br>

            <div>
                <label for="businessName">Business Name:</label><br>
                <input type="text"
                       id="businessName"
                       name="businessName"
                       th:value="${organizer.businessName}"
                       required>
            </div>

            <br>

            <div>
                <label for="description">Description:</label><br>
                <textarea id="description"
                          name="description"
                          rows="4"
                          cols="40"
                          th:text="${organizer.description}"></textarea>
            </div>

            <br>

            <div>
                <label for="serviceCategory">Service Category:</label><br>
                <select id="serviceCategory"
                        name="serviceCategory"
                        required>
                    <option value="">Select a category</option>
                    <option th:each="category : ${serviceCategories}"
                            th:value="${category}"
                            th:text="${category}"
                            th:selected="${category == organizer.serviceCategory}">
                    </option>
                </select>
            </div>

            <br>

            <div>
                <label for="phone">Phone:</label><br>
                <input type="text"
                       id="phone"
                       name="phone"
                       th:value="${organizer.phone}">
            </div>

            <br>

            <div>
                <label for="website">Website:</label><br>
                <input type="text"
                       id="website"
                       name="website"
                       th:value="${organizer.website}">
            </div>

            <br>

            <div>
                <label for="address">Address:</label><br>
                <input type="text"
                       id="address"
                       name="address"
                       th:value="${organizer.address}">
            </div>

            <br>

            <div>
                <button type="submit"
                        th:text="${isEdit} ? 'Save Changes' : 'Create Organizer'">
                    Save
                </button>
            </div>
        </form>

        <br>

        <p>
            <a th:href="@{/organizers}">Back</a>
        </p>
    </div>
</div>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
