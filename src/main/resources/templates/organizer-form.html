<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Organizer Form</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/form.css}">
    <link rel="stylesheet" th:href="@{/css/profile-form.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
    <section class="profile-form-page">
        <div class="profile-form-page__header">
            <p class="profile-form-page__eyebrow">Profile</p>
            <h1 th:text="${isEdit ? 'Edit Organizer Profile' : 'Create Organizer Profile'}">Organizer Form</h1>
            <p class="profile-form-page__intro">Keep your business profile accurate so customers can understand your services and contact details.</p>
        </div>

        <p class="profile-form-error" th:if="${error}" th:text="${error}"></p>

        <form th:action="${isEdit} ? @{/profile/organizer} : @{/organizers}" method="post" class="admin-form profile-form">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <label class="admin-form__field" th:if="${!isEdit}">
                <span>Organizer User</span>
                <select id="userId" name="userId" required>
                    <option value="">-- Select Organizer User --</option>
                    <option th:each="user : ${users}"
                            th:value="${user.id}"
                            th:text="${user.email}">
                    </option>
                </select>
            </label>

            <label class="admin-form__field" th:if="${isEdit}">
                <span>Email</span>
                <input type="email"
                       id="email"
                       name="email"
                       th:value="${email}"
                       required>
            </label>

            <label class="admin-form__field">
                <span>Business Name</span>
                <input type="text"
                       id="businessName"
                       name="businessName"
                       th:value="${organizer.businessName}"
                       required>
            </label>

            <label class="admin-form__field">
                <span>Description</span>
                <textarea id="description"
                          name="description"
                          rows="4"
                          required
                          th:text="${organizer.description}"></textarea>
            </label>

            <section class="profile-form__checkbox-group">
                <p class="profile-form__checkbox-label">Service Categories</p>
                <div class="profile-form__checkbox-list">
                    <label class="profile-form__checkbox-item" th:each="category : ${categories}">
                        <input type="checkbox"
                               name="categoryIds"
                               th:value="${category.id}"
                               th:checked="${organizer.categories != null and #lists.contains(organizer.categories.![id], category.id)}">
                        <span th:text="${category.name}">Category</span>
                    </label>
                </div>
            </section>

            <div class="profile-form-grid">
                <label class="admin-form__field">
                    <span>Phone</span>
                    <input type="text"
                           id="phone"
                           name="phone"
                           required
                           th:value="${organizer.phone}">
                </label>

                <label class="admin-form__field">
                    <span>Website</span>
                    <input type="text"
                           id="website"
                           name="website"
                           required
                           th:value="${organizer.website}">
                </label>

                <label class="admin-form__field">
                    <span>Address</span>
                    <input type="text"
                           id="address"
                           name="address"
                           required
                           th:value="${organizer.address}">
                </label>
            </div>

            <div class="profile-form__actions">
                <a th:href="@{/profile}" class="profile-form__button profile-form__button--secondary">Cancel</a>
                <button type="submit"
                        class="profile-form__button"
                        th:text="${isEdit ? 'Save Changes' : 'Create Organizer'}">
                    Save
                </button>
            </div>
        </form>
    </section>
</main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
