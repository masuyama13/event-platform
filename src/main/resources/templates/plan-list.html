<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Browse Plans</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<div class="container">
    <h1>Available Plans</h1>

    <div class="plans-container" th:if="${plans != null and !#lists.isEmpty(plans)}">
        <div class="plan-card" th:each="plan : ${plans}">
            <h2 th:text="${plan.planName}">Plan Name</h2>

            <p>Organizer:
                <span th:text="${plan.organizer != null}
                               ? ${plan.organizer.businessName} : 'N/A'">
                    Organizer Name
                </span>
            </p>

            <p>Description:
                <span th:text="${plan.description} ?: 'N/A'">
                    Description
                </span>
            </p>

            <p>Price:
                $<span th:text="${plan.price}">Price</span>
            </p>

            <a th:href="@{/plan/{planId}(planId=${plan.id}, organizerId=${organizerId})}" class="btn-select">
                View Plan
            </a>
        </div>
    </div>

    <p th:if="${plans == null or #lists.isEmpty(plans)}">No plans are available for this organizer yet.</p>

    <br/>
    <a th:href="@{/organizers/{organizerId}(organizerId=${organizerId})}" class="btn-back">Back</a>
</div>

 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
