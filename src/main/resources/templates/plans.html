<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Plans</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<h1>Plans List</h1>
<a th:href="@{/plans/new}">Create Plan</a>

<hr>

<div th:each="plan : ${plans}">
    <p>ID: <span th:text="${plan.id}"></span></p>

    <p>Plan Name: <span th:text="${plan.planName}"></span></p>
    <p>Price: <span th:text="${plan.price}"></span></p>
    <p>Description: <span th:text="${plan.description}"></span></p>
    <p>Organizer: <span th:text="${plan.organizer != null ? plan.organizer.businessName : 'N/A'}"></span></p>
    <a th:href="@{/plans/{planId}/edit(planId=${plan.id})}">Edit</a>

    <hr>
</div>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
