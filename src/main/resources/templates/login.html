<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Sign In</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">
<h1>Sign In</h1>

<form th:action="@{/login}" method="post">
    <div>
        <label>Email:</label>
        <input type="email" name="username" required>
    </div>
    <div>
        <label>Password:</label>
        <input type="password" name="password" required>
    </div>
    <button type="submit">Sign In</button>
</form>

<p><a th:href="@{/register}">Create a customer account</a></p>
<p><a th:href="@{/organizer/register}">Create an organizer account</a></p>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
