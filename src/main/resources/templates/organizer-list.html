<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Organizer List</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<div class="container">
    <h1>Organizer List</h1>

    <form method="get" th:action="@{/organizers}" style="margin-bottom: 16px;">
        <label for="categoryId">Filter by category:</label>
        <select id="categoryId" name="categoryId">
            <option value="">All categories</option>
            <option th:each="category : ${categories}"
                    th:value="${category.id}"
                    th:text="${category.name}"
                    th:selected="${selectedCategoryId != null and selectedCategoryId == category.id}">
            </option>
        </select>
        <button type="submit">Apply</button>
    </form>

    <div class="plans-container"
         th:if="${organizers != null and !#lists.isEmpty(organizers)}">

        <div class="plan-card" th:each="organizer : ${organizers}">
            <h2 th:text="${organizer.businessName}">Business Name</h2>

            <p>Email:
                <span th:text="${organizer.user.email}">
                    organizer@email.com
                </span>
            </p>
            <p>Categories:
                <span th:text="${organizer.categories != null and !#sets.isEmpty(organizer.categories) ? #strings.listJoin(organizer.categories.![name], ', ') : 'N/A'}">
                    Category
                </span>
            </p>
            <p>Phone:
                <span th:text="${organizer.phone} ?: 'N/A'">
                    Phone
                </span>
            </p>
            <p>Website:
                <span th:text="${organizer.website} ?: 'N/A'">
                    Website
                </span>
            </p>
              <!-- Average Rating Display -->
            <p>Rating:
                <strong style="color: #f5a623;"
                        th:text="${organizer.averageRating != null}
                                  ? (${organizer.averageRating} + ' / 5')
                                  : '0.0 / 5'">
                    0.0 / 5
                </strong>
            </p>

            <!-- Action Buttons -->
            <div class="buttons">
                <a th:href="@{/organizers/{id}(id=${organizer.id})}"
                   class="btn-back">
                    View Details
                </a>
            </div>

        </div>
    </div>

    <div th:if="${organizers == null or #lists.isEmpty(organizers)}">
        <p>No organizers found.</p>
    </div>
</div>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
