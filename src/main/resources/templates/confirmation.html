<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm Booking</title>
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body>

<div class="container">
    <h1>Booking Confirmation</h1>

    <div class="confirmation-card">
        <h2>Please Review Your Booking</h2>

        <table class="info-table">
            <tr>
                <td>Plan Name:</td>
                <td th:text="${quote.planName}">Plan Name</td>
            </tr>
            <tr>
                <td>Organizer:</td>
                <td th:text="${quote.organizer != null}
                             ? ${quote.organizer.businessName} : 'N/A'">
                    Organizer Name
                </td>
            </tr>
            <tr>
                <td>Description:</td>
                <td th:text="${quote.description} ?: 'N/A'">Description</td>
            </tr>
            <tr>
                <td>Price:</td>
                <td>$<span th:text="${quote.price}">Price</span></td>
            </tr>
        </table>

        <form action="/booking/thankyou" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>
            <input type="hidden" name="planName"
                   th:value="${quote.planName}"/>
            <input type="hidden" name="organizerName"
                   th:value="${quote.organizer != null
                               ? quote.organizer.businessName : ''}"/>
            <input type="hidden" name="eventDate"
                   th:value="${#temporals.format(
                               #temporals.createNow(), 'yyyy-MM-dd')}"/>
            <input type="hidden" name="price"
                   th:value="${quote.price}"/>

            <div class="buttons">
                <a href="/booking/plans" onclick="if (history.length > 1) { history.back(); return false; }" class="btn-back">Back</a>
                <button type="submit" class="btn-confirm">Confirm</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
