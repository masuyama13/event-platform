<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Confirm Booking</title>
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body>

<div class="container">
    <h1>Booking Confirmation</h1>

    <div class="confirmation-card">
        <h2>Please Review Your Booking</h2>

        <table class="info-table">
            <tr>
                <td>Organizer:</td>
                <td th:text="${booking.organizerProfile != null
                               ? booking.organizerProfile.businessName : 'N/A'}">
                    Organizer Name
                </td>
            </tr>
            <tr>
                <td>Plan Name:</td>
                <td th:text="${booking.planName}">Plan Name</td>
            </tr>
            <tr>
                <td>Date:</td>
                <td th:text="${booking.eventDate}">Date</td>
            </tr>
            <tr>
                <td>Price:</td>
                <td>$<span th:text="${booking.price}">Price</span></td>
            </tr>
        </table>

        <form action="/booking/thankyou" method="post">
            <input type="hidden" name="organizerName"
                   th:value="${booking.organizerProfile != null
                               ? booking.organizerProfile.businessName : ''}"/>
            <input type="hidden" name="planName"
                   th:value="${booking.planName}"/>
            <input type="hidden" name="eventDate"
                   th:value="${booking.eventDate}"/>
            <input type="hidden" name="price"
                   th:value="${booking.price}"/>

            <div class="buttons">
                <a href="/booking/plans" class="btn-back">Go Back</a>
                <button type="submit" class="btn-confirm">Confirm</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
