<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Select a Plan</title>
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body>

<div class="container">
    <h1>Available Plans</h1>

    <div class="plans-container">
        <div class="plan-card" th:each="plan : ${plans}">
            <h2 th:text="${plan.planName}">Plan Name</h2>

            <p>Organizer:
                <span th:text="${plan.organizer != null}
                               ? ${plan.organizer.businessName} : 'N/A'">
                    Organizer Name
                </span>
            </p>

            <p>Description:
                <span th:text="${plan.description} ?: 'N/A'">
                    Description
                </span>
            </p>

            <p>Price:
                $<span th:text="${plan.price}">Price</span>
            </p>

            <form action="/booking/confirm" method="post">
                <input type="hidden"
                       th:if="${_csrf != null}"
                       th:name="${_csrf.parameterName}"
                       th:value="${_csrf.token}"/>
                <input type="hidden" name="planName"
                       th:value="${plan.planName}">
                <button type="submit" class="btn-select">
                    Select This Plan
                </button>
            </form>
        </div>
    </div>

    <br/>
    <a href="/" th:href="@{/}" onclick="if (history.length > 1) { history.back(); return false; }" class="btn-back">Back</a>
</div>

</body>
</html>
