<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Write Review</title>
    <link rel="stylesheet" th:href="@{/css/common.css}">
    <link rel="stylesheet" th:href="@{/css/booking.css}">
</head>
<body class="app-shell">
<header th:replace="~{layout/fragments :: siteHeader}"></header>
<main class="app-main">

<div class="container">
    <div class="plan-card">
        <h1>Write a Review</h1>

        <p th:if="${error}" th:text="${error}" style="color:red;"></p>

        <p th:if="${existingRating != null and existingRating > 0}">
            Your current rating:
            <strong th:text="${existingRating} + ' / 5'">0 / 5</strong>
        </p>

        <p th:if="${existingReview != null and !existingReview.isEmpty()}">
            Your current review:
        </p>

        <form th:action="@{/reviews/submit}" method="post">
            <input type="hidden"
                   th:if="${_csrf != null}"
                   th:name="${_csrf.parameterName}"
                   th:value="${_csrf.token}"/>

            <input type="hidden" name="organizerId" th:value="${organizerId}"/>

            <div>
                <label for="ratingValue">Rating</label>
                <select id="ratingValue" name="ratingValue" required>
                    <option value="">Select a rating</option>
                    <option value="5" th:selected="${existingRating == 5}">5</option>
                    <option value="4" th:selected="${existingRating == 4}">4</option>
                    <option value="3" th:selected="${existingRating == 3}">3</option>
                    <option value="2" th:selected="${existingRating == 2}">2</option>
                    <option value="1" th:selected="${existingRating == 1}">1</option>
                </select>
            </div>

            <br>

            <div>
                <textarea name="reviewText"
                          rows="6"
                          cols="50"
                          placeholder="Write your review here..."
                          th:text="${existingReview}"></textarea>
            </div>

            <br>

            <div class="buttons">
                <a th:href="@{/organizers/{id}(id=${organizerId})}" class="btn-back">Cancel</a>
                <button type="submit" class="btn-confirm">Submit Review</button>
            </div>
        </form>
    </div>
</div>
 </main>
<footer th:replace="~{layout/fragments :: siteFooter}"></footer>
</body>
</html>
